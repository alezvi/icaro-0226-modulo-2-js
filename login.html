<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <div class="row">
            <div class="col">
                <h1>Registro</h1>

                <form action="">
                    <div class="form-group my-3">
                        <label class="my-2" for="">Email</label>
                        <input class="form-control" type="email" required>
                    </div>
                    
                    <div class="form-group my-3">
                        <label class="my-2" for="">Edad</label>
                        <input class="form-control" type="number" required>
                    </div>
                    
                    <div class="form-group my-3">
                        <label class="my-2" for="">Password</label>
                        <input class="form-control" type="password" required novalidate>
                    </div>
                    
                    <div class="form-group my-3">
                        <label class="my-2" for="">Repetir Password</label>
                        <input class="form-control" type="password">
                    </div>
                    
                    <div class="form-group my-3">
                        <input class="" type="checkbox" checked>
                        <label class="my-2" for="">Aceptar terminos y condiciones</label>
                    </div>
                    
                    <div class="form-group">
                        <button class="btn btn-primary">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="bot.js"></script>
  </body>
</html>
